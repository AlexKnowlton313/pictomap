# Build the app and publish to S3 + invalidate CloudFront on every push to main.
#
# Tile URLs are no longer baked into the build — the app fetches a manifest
# at runtime (default /tiles/manifest.json, served from the same CloudFront)
# and picks a region by geolocation. So a tile refresh doesn't need an app
# redeploy, and an app deploy doesn't need to know anything about tiles.
#
# One-time AWS setup:
#   1. Create an IAM OIDC provider for token.actions.githubusercontent.com.
#   2. Create an IAM role assumable by repo:AlexKnowlton313/pictomap:* with
#      a policy granting s3:PutObject/DeleteObject/GetObject/ListBucket on
#      arn:aws:s3:::alex-knowlton/pictomap/* and cloudfront:CreateInvalidation
#      on the distribution. Store the role ARN as repo secret AWS_DEPLOY_ROLE_ARN.
#   3. (Optional) Set repo secret VITE_SENTRY_DSN.

name: Deploy app

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-app
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - run: ./deploy.sh
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
